<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <title>Reset password</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color:#202020; }
      .btn { display:inline-block; padding:.6em 1.2em; background:#0d6efd; color:#fff!important;
             text-decoration:none; border-radius:4px; }
      .container { max-width:540px; margin:auto; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Reset della password</h2>
      <p>Ciao {{ user.email }},</p>

      <p>Abbiamo ricevuto una richiesta di reset della tua password.</p>

      <p style="text-align:center; margin:32px 0;">
        <a href="{{ reset_url }}" class="btn">Imposta nuova password</a>
      </p>

      <p>Se non hai richiesto tu questa operazione, puoi ignorare questa email.</p>

      <p style="margin-top:2rem;">— Team Corposostenibile</p>
    </div>
  </body>
</html>
