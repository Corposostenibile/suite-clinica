{#
    TAB PAGAMENTI INTERNI - Partial Template
    Solo storico pagamenti del cliente
#}

<!-- Storico Pagamenti -->
<div class="modern-card" style="background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); border: 2px solid rgba(100, 116, 139, 0.1);">
    <div class="modern-card-header" style="background: linear-gradient(135deg, rgba(100, 116, 139, 0.05) 0%, rgba(148, 163, 184, 0.05) 100%); border-bottom: 2px solid rgba(100, 116, 139, 0.15);">
        <h5 class="modern-card-title mb-0">
            <i class="ri-history-line" style="color: #64748B;"></i>
            Storico Pagamenti
        </h5>
    </div>
    <div class="modern-card-body">
        <div class="table-responsive">
            <table class="table table-hover" id="tabella-pagamenti">
                <thead class="table-light">
                    <tr>
                        <th>Data</th>
                        <th>Tipologia</th>
                        <th>Pacchetto</th>
                        <th>Importo</th>
                        <th>Durata</th>
                        <th>Metodo</th>
                        <th>Stato</th>
                        <th>Inserito da</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabella-pagamenti">
                    <tr>
                        <td colspan="8" class="text-center text-muted py-4">
                            <i class="ri-loader-4-line ri-spin ri-2x"></i>
                            <p class="mb-0 mt-2">Caricamento pagamenti...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const clienteId = {{ cliente.cliente_id }};

    // Carica storico pagamenti
    function loadPagamenti() {
        fetch(`/customers/${clienteId}/pagamenti/interni`)
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('corpo-tabella-pagamenti');

                if (data.success && data.pagamenti && data.pagamenti.length > 0) {
                    tbody.innerHTML = '';
                    data.pagamenti.forEach(p => {
                        const statoClass = p.stato_approvazione === 'approvato' ? 'bg-success' :
                                          p.stato_approvazione === 'rifiutato' ? 'bg-danger' : 'bg-secondary';
                        const statoTesto = p.stato_approvazione === 'approvato' ? 'Approvato' :
                                          p.stato_approvazione === 'rifiutato' ? 'Rifiutato' : 'Da Valutare';

                        const dataFormatted = p.data_pagamento ?
                            new Date(p.data_pagamento).toLocaleDateString('it-IT') : '-';

                        // Estrai tipologia dal servizio_acquistato (es: "Rinnovo - Nome Pacchetto")
                        const servizioSplit = (p.servizio_acquistato || '-').split(' - ');
                        const tipologia = servizioSplit[0] || '-';
                        const pacchetto = servizioSplit[1] || p.pacchetto_nome || '-';

                        tbody.innerHTML += `
                            <tr>
                                <td>${dataFormatted}</td>
                                <td><span class="badge bg-info">${tipologia}</span></td>
                                <td>${pacchetto}</td>
                                <td><strong>&euro; ${parseFloat(p.importo).toFixed(2)}</strong></td>
                                <td>${p.durata || '-'}</td>
                                <td>${p.metodo_pagamento || '-'}</td>
                                <td><span class="badge ${statoClass}">${statoTesto}</span></td>
                                <td>${p.created_by || '-'}</td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="8" class="text-center text-muted py-4">
                                <i class="ri-money-euro-circle-line ri-2x mb-2 d-block" style="opacity: 0.3;"></i>
                                Nessun pagamento registrato per questo cliente.
                            </td>
                        </tr>
                    `;
                }
            })
            .catch(error => {
                console.error('Errore caricamento pagamenti:', error);
                document.getElementById('corpo-tabella-pagamenti').innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center text-danger py-4">
                            Errore nel caricamento dei pagamenti
                        </td>
                    </tr>
                `;
            });
    }

    // Carica pagamenti all'apertura
    loadPagamenti();
});
</script>
