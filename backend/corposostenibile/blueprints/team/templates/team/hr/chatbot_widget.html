<!-- AI Chatbot Widget -->
<style>
  .chatbot-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
  }
  
  .chatbot-button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    transition: all 0.3s;
  }
  
  .chatbot-button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
  }
  
  .chatbot-container {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 380px;
    height: 500px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    display: none;
    flex-direction: column;
    z-index: 999;
  }
  
  .chatbot-container.active {
    display: flex;
    animation: slideUp 0.3s ease;
  }
  
  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  .chatbot-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 15px 20px;
    border-radius: 15px 15px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .chatbot-header h5 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  
  .chatbot-close {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    padding: 0;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f8f9fa;
  }
  
  .chat-message {
    margin-bottom: 15px;
    display: flex;
    align-items: flex-start;
    animation: fadeIn 0.3s;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .chat-message.user {
    justify-content: flex-end;
  }
  
  .chat-message.bot {
    justify-content: flex-start;
  }
  
  .message-bubble {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 15px;
    font-size: 14px;
    line-height: 1.4;
  }
  
  .user .message-bubble {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-bottom-right-radius: 5px;
  }
  
  .bot .message-bubble {
    background: white;
    color: #333;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 5px;
  }
  
  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    margin: 0 8px;
  }
  
  .bot .message-avatar {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }
  
  .typing-indicator {
    display: none;
    padding: 10px 15px;
    background: white;
    border-radius: 15px;
    border: 1px solid #e5e7eb;
    margin-bottom: 15px;
  }
  
  .typing-indicator.active {
    display: inline-block;
  }
  
  .typing-indicator span {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #667eea;
    animation: typing 1.4s infinite;
    margin: 0 2px;
  }
  
  .typing-indicator span:nth-child(2) {
    animation-delay: 0.2s;
  }
  
  .typing-indicator span:nth-child(3) {
    animation-delay: 0.4s;
  }
  
  @keyframes typing {
    0%, 60%, 100% {
      transform: translateY(0);
    }
    30% {
      transform: translateY(-10px);
    }
  }
  
  .chatbot-input {
    padding: 15px;
    border-top: 1px solid #e5e7eb;
    background: white;
    border-radius: 0 0 15px 15px;
  }
  
  .chat-input-group {
    display: flex;
    gap: 10px;
  }
  
  .chat-input {
    flex: 1;
    border: 1px solid #e5e7eb;
    border-radius: 25px;
    padding: 10px 20px;
    font-size: 14px;
    outline: none;
    transition: all 0.3s;
  }
  
  .chat-input:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }
  
  .chat-send {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
  }
  
  .chat-send:hover {
    transform: scale(1.1);
  }
  
  .chat-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  
  .chat-suggestions {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  
  .suggestion-chip {
    background: white;
    border: 1px solid #667eea;
    color: #667eea;
    padding: 5px 12px;
    border-radius: 15px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .suggestion-chip:hover {
    background: #667eea;
    color: white;
    transform: scale(1.05);
  }
</style>

<div class="chatbot-widget">
  <!-- Chat Button -->
  <button class="chatbot-button" id="chatbotToggle">
    <i class="ri-robot-line"></i>
  </button>
  
  <!-- Chat Container -->
  <div class="chatbot-container" id="chatbotContainer">
    <!-- Header -->
    <div class="chatbot-header">
      <h5>🤖 Assistente AI</h5>
      <button class="chatbot-close" id="chatbotClose">
        <i class="ri-close-line"></i>
      </button>
    </div>
    
    <!-- Messages Area -->
    <div class="chatbot-messages" id="chatMessages">
      <!-- Welcome Message -->
      <div class="chat-message bot">
        <div class="message-avatar">🤖</div>
        <div class="message-bubble">
          Ciao! Sono il tuo assistente AI. Posso rispondere a qualsiasi domanda, incluse quelle sui candidati di questa posizione. Come posso aiutarti?
        </div>
      </div>
    </div>
    
    <!-- Input Area -->
    <div class="chatbot-input">
      <!-- Quick Suggestions -->
      <div class="chat-suggestions">
        <div class="suggestion-chip" data-question="Chi è il candidato migliore?">
          👥 Candidato migliore
        </div>
        <div class="suggestion-chip" data-question="Mostrami i candidati con esperienza DCA">
          📋 Con esperienza DCA
        </div>
        <div class="suggestion-chip" data-question="Quanti candidati ci sono?">
          📊 Statistiche
        </div>
        <div class="suggestion-chip" data-question="Come funziona lo screening AI?">
          ❓ Come funziona
        </div>
      </div>
      
      <!-- Input Field -->
      <div class="chat-input-group">
        <input 
          type="text" 
          class="chat-input" 
          id="chatInput" 
          placeholder="Scrivi un messaggio..."
          autocomplete="off"
        >
        <button class="chat-send" id="chatSend">
          <i class="ri-send-plane-2-line"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
class HRChatbot {
  constructor() {
    this.isOpen = false;
    this.messages = [];
    this.init();
  }
  
  init() {
    // Toggle chat
    document.getElementById('chatbotToggle').addEventListener('click', () => {
      this.toggle();
    });
    
    document.getElementById('chatbotClose').addEventListener('click', () => {
      this.close();
    });
    
    // Send message
    document.getElementById('chatSend').addEventListener('click', () => {
      this.sendMessage();
    });
    
    // Enter key
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        this.sendMessage();
      }
    });
    
    // Suggestion chips
    document.querySelectorAll('.suggestion-chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        const question = e.target.dataset.question;
        document.getElementById('chatInput').value = question;
        this.sendMessage();
      });
    });
  }
  
  toggle() {
    if (this.isOpen) {
      this.close();
    } else {
      this.open();
    }
  }
  
  open() {
    document.getElementById('chatbotContainer').classList.add('active');
    document.getElementById('chatbotToggle').innerHTML = '<i class="ri-close-line"></i>';
    this.isOpen = true;
    
    // Focus input
    setTimeout(() => {
      document.getElementById('chatInput').focus();
    }, 300);
  }
  
  close() {
    document.getElementById('chatbotContainer').classList.remove('active');
    document.getElementById('chatbotToggle').innerHTML = '<i class="ri-robot-line"></i>';
    this.isOpen = false;
  }
  
  async sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    
    if (!message) return;
    
    // Add user message
    this.addMessage(message, 'user');
    
    // Clear input
    input.value = '';
    
    // Show typing indicator
    this.showTyping();
    
    // Get opening ID from URL
    const pathParts = window.location.pathname.split('/');
    const openingId = pathParts[pathParts.indexOf('openings') + 1];
    
    try {
      // Call API
      const response = await fetch(`/team/hr/api/openings/${openingId}/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': this.getCsrfToken()
        },
        body: JSON.stringify({ question: message })
      });
      
      const data = await response.json();
      
      // Hide typing
      this.hideTyping();
      
      if (data.success) {
        // Add bot response
        this.addMessage(data.answer, 'bot');
        
        // Show info if candidates were analyzed
        if (data.candidates_in_context > 0) {
          this.addSystemInfo(`📊 Ho analizzato ${data.candidates_in_context} candidati per questa risposta`);
        }
      } else {
        this.addMessage('Mi dispiace, c\'è stato un errore. Riprova.', 'bot');
      }
      
    } catch (error) {
      console.error('Chat error:', error);
      this.hideTyping();
      this.addMessage('Errore di connessione. Riprova tra poco.', 'bot');
    }
  }
  
  addMessage(text, type) {
    const messagesDiv = document.getElementById('chatMessages');
    
    const messageDiv = document.createElement('div');
    messageDiv.className = `chat-message ${type}`;
    
    if (type === 'bot') {
      messageDiv.innerHTML = `
        <div class="message-avatar">🤖</div>
        <div class="message-bubble">${this.formatMessage(text)}</div>
      `;
    } else {
      messageDiv.innerHTML = `
        <div class="message-bubble">${this.escapeHtml(text)}</div>
      `;
    }
    
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
  
  addSystemInfo(text) {
    const messagesDiv = document.getElementById('chatMessages');
    const infoDiv = document.createElement('div');
    infoDiv.style.cssText = 'text-align: center; color: #6b7280; font-size: 12px; margin: 10px 0;';
    infoDiv.textContent = text;
    messagesDiv.appendChild(infoDiv);
  }
  
  showTyping() {
    const messagesDiv = document.getElementById('chatMessages');
    
    const typingDiv = document.createElement('div');
    typingDiv.className = 'chat-message bot';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = `
      <div class="message-avatar">🤖</div>
      <div class="typing-indicator active">
        <span></span>
        <span></span>
        <span></span>
      </div>
    `;
    
    messagesDiv.appendChild(typingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
  
  hideTyping() {
    const typing = document.getElementById('typingIndicator');
    if (typing) {
      typing.remove();
    }
  }
  
  formatMessage(text) {
    // Convert markdown-like formatting
    text = this.escapeHtml(text);
    
    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    
    // Lists
    text = text.replace(/^• /gm, '&bull; ');
    text = text.replace(/^- /gm, '&ndash; ');
    
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    
    return text;
  }
  
  escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  getCsrfToken() {
    return document.querySelector('meta[name="csrf-token"]')?.content || 
           document.querySelector('[name="csrf_token"]')?.value ||
           this.getCookie('csrf_token') || '';
  }
  
  getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }
}

// Initialize when DOM is ready
document.addEventListener('DOMContentLoaded', () => {
  new HRChatbot();
});
</script>
