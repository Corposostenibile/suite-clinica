{# CSS base migliorato per tutti gli step del weekly report #}
<style>
    /* Header gradient */
    .step-header {
        background: linear-gradient(135deg, #28c76f 0%, #24b662 100%);
        border-radius: 20px;
        padding: 2.5rem;
        margin-bottom: 2.5rem;
        box-shadow: 0 10px 30px rgba(40, 199, 111, 0.2);
    }
    
    .step-header h4 {
        color: #fff;
        font-weight: 700;
        margin-bottom: 0.5rem;
        font-size: 1.75rem;
    }
    
    .step-header p {
        color: rgba(255,255,255,0.9);
        font-size: 1.1rem;
    }
    
    /* Container */
    .step-container {
        max-width: 800px;
        margin: 0 auto;
    }
    
    /* Progress indicator */
    .progress-indicator {
        background: white;
        padding: 2rem 1.5rem;
        border-radius: 16px;
        margin-bottom: 3rem;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        position: relative;
    }
    
    .progress-indicator::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 80px;
        right: 80px;
        height: 3px;
        background: linear-gradient(90deg, #e9ecef 0%, #dee2e6 100%);
        transform: translateY(-50%);
        z-index: 0;
    }
    
    .progress-step {
        position: relative;
        z-index: 1;
    }
    
    .step-number {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: white;
        border: 3px solid #e9ecef;
        color: #adb5bd;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.1rem;
        margin: 0 auto;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
    }
    
    .progress-step.active .step-number {
        background: linear-gradient(135deg, #28c76f 0%, #24b662 100%);
        color: white;
        border-color: #28c76f;
        transform: scale(1.15);
        box-shadow: 0 8px 25px rgba(40, 199, 111, 0.4);
    }
    
    .progress-step.completed .step-number {
        background: #28c76f;
        color: white;
        border-color: #28c76f;
    }
    
    .progress-step.completed .step-number::after {
        content: '✓';
        position: absolute;
        font-size: 1.4rem;
    }
    
    /* Question title styling */
    .question-title {
        font-size: 1.35rem;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        line-height: 1.4;
    }
    
    .question-icon {
        font-size: 1.75rem;
        background: linear-gradient(135deg, #28c76f 0%, #24b662 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        flex-shrink: 0;
    }
    
    /* Form section con glassmorphism effect */
    .form-section {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 2.5rem;
        margin-bottom: 2rem;
        position: relative;
        box-shadow: 0 8px 32px rgba(31, 38, 135, 0.12);
        transition: all 0.3s ease;
    }
    
    .form-section:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(31, 38, 135, 0.15);
    }
    
    /* Decorazione laterale */
    .form-section::before {
        content: '';
        position: absolute;
        top: 20px;
        left: 0;
        width: 5px;
        height: calc(100% - 40px);
        background: linear-gradient(135deg, #28c76f 0%, #24b662 100%);
        border-radius: 0 5px 5px 0;
    }
    
    /* Textarea styling moderno */
    textarea.form-control {
        min-height: 140px;
        resize: vertical;
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 16px;
        font-size: 1.05rem;
        line-height: 1.6;
        transition: all 0.3s ease;
        background: #fafbfc;
    }
    
    textarea.form-control:focus {
        border-color: #28c76f;
        box-shadow: 0 0 0 4px rgba(40, 199, 111, 0.1);
        background: white;
        outline: none;
    }
    
    textarea.form-control::placeholder {
        color: #adb5bd;
        font-style: italic;
    }
    
    /* Action buttons migliorati */
    .action-buttons {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        margin-top: 3rem;
        padding-top: 2rem;
        border-top: 2px solid #f1f3f5;
    }
    
    .btn {
        padding: 14px 32px;
        font-weight: 600;
        font-size: 1rem;
        border-radius: 12px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
        border: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .btn-cancel {
        background: #f1f3f5;
        color: #495057;
    }
    
    .btn-cancel:hover {
        background: #e9ecef;
        transform: translateX(-3px);
    }
    
    .btn-success {
        background: linear-gradient(135deg, #28c76f 0%, #24b662 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(40, 199, 111, 0.3);
    }
    
    .btn-success:hover {
        transform: translateX(3px);
        box-shadow: 0 6px 20px rgba(40, 199, 111, 0.4);
    }
    
    .btn-success.btn-lg {
        padding: 16px 40px;
        font-size: 1.1rem;
    }
    
    /* Ripple effect sui pulsanti */
    .btn::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }
    
    .btn:active::after {
        width: 300px;
        height: 300px;
    }
    
    /* Icon animations */
    .btn iconify-icon {
        font-size: 1.25rem;
        transition: all 0.3s ease;
    }
    
    .btn:hover iconify-icon[icon*="arrow-right"] {
        transform: translateX(4px);
    }
    
    .btn:hover iconify-icon[icon*="arrow-left"] {
        transform: translateX(-4px);
    }
    
    .btn:hover iconify-icon[icon*="check"] {
        transform: scale(1.2) rotate(5deg);
    }
    
    /* Error states */
    .form-control.is-invalid {
        border-color: #e74c3c;
        background: #fff5f5;
    }
    
    .form-control.is-invalid:focus {
        border-color: #e74c3c;
        box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1);
    }
    
    .text-danger {
        color: #e74c3c;
        font-size: 0.875rem;
        margin-top: 0.5rem;
    }
    
    /* Success message */
    .alert {
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 1.5rem;
        border: none;
        font-weight: 500;
    }
    
    .alert-success {
        background: linear-gradient(135deg, #28c76f 0%, #24b662 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(40, 199, 111, 0.3);
    }
    
    .alert-warning {
        background: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(255, 159, 67, 0.3);
    }
    
    /* Loading state */
    @keyframes shimmer {
        0% { background-position: -100% 0; }
        100% { background-position: 100% 0; }
    }
    
    .loading {
        background: linear-gradient(90deg, #f8f9fa 25%, #e9ecef 50%, #f8f9fa 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
    }
    
    /* Smooth transitions */
    * {
        transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
    }
    
    /* Mobile responsive */
    @media (max-width: 768px) {
        .step-header {
            padding: 2rem 1.5rem;
            text-align: center;
        }
        
        .step-header h4 {
            font-size: 1.5rem;
        }
        
        .form-section {
            padding: 2rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .question-title {
            font-size: 1.15rem;
            flex-direction: column;
            text-align: center;
        }
        
        .question-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .action-buttons {
            flex-direction: column-reverse;
        }
        
        .action-buttons .btn {
            width: 100%;
            justify-content: center;
        }
        
        .progress-indicator {
            padding: 1.5rem 1rem;
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            font-size: 1rem;
        }
    }
    
    /* Animazioni di entrata */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .form-section {
        animation: fadeInUp 0.5s ease-out;
    }
    
    .step-header {
        animation: fadeInUp 0.3s ease-out;
    }
    
    .progress-indicator {
        animation: fadeInUp 0.4s ease-out;
    }
</style>
