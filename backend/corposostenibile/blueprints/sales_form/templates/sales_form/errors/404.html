{% extends "base.html" %}

{% block title %}404 - Pagina Non Trovata – Corposostenibile{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card text-center py-5">
                <div class="card-body">
                    <i class="ri-error-warning-line ri-4x text-warning mb-3"></i>
                    <h1 class="mb-3">404</h1>
                    <h4>Pagina Non Trovata</h4>
                    <p class="text-muted mb-4">{{ message|default('La pagina richiesta non è stata trovata') }}</p>
                    <a href="{{ url_for('sales_form.dashboard') }}" class="btn btn-primary">
                        <i class="ri-home-line me-2"></i>Torna alla Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
