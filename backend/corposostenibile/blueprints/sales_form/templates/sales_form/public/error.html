<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Errore - Corpo Sostenibile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .error-container { max-width: 600px; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15); padding: 60px 40px; text-align: center; }
        .error-icon { width: 100px; height: 100px; background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 12px 30px; border-radius: 50px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon"><i class="ri-error-warning-line ri-3x text-white"></i></div>
        <h1 class="mb-3">{{ title|default('Oops! Si è verificato un errore') }}</h1>
        <p class="lead mb-4">{{ message|default('Si è verificato un problema durante l\'invio del form. Ti preghiamo di riprovare.') }}</p>
        {% if error_details %}
        <div class="alert alert-danger text-start"><h6>Dettagli errore:</h6><p class="mb-0 small">{{ error_details }}</p></div>
        {% endif %}
        <div class="mt-4">
            <button class="btn btn-primary me-2" onclick="window.history.back()"><i class="ri-arrow-left-line me-2"></i> Torna Indietro</button>
            <a href="https://corposostenibile.it" class="btn btn-outline-primary">Vai al Sito <i class="ri-home-line ms-2"></i></a>
        </div>
    </div>
</body>
</html>
