site_name: Corposostenibile Documentation
site_dir: static

theme:
  name: material
  language: it
  custom_dir: overrides
  palette:
    primary: green
    accent: green
  features:
    - content.code.copy

extra_css:
  - stylesheets/extra.css
  - mermaid-styles.css

extra_javascript:
  - javascripts/nav-scope.js
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences: {}

