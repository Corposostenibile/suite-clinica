site_name: Corposostenibile Documentation
site_dir: static

theme:
  name: material
  language: it
  custom_dir: overrides
  palette:
    primary: green
    accent: green

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Benvenuto: index.md
  - Gestione Pazienti:
    - Lista Pazienti:
      - Team Leader: pazienti/lista_team_leader.md
      - Professionista: pazienti/lista_professionista.md
    - Scheda Dettaglio:
      - Team Leader: pazienti/dettaglio_team_leader.md
      - Professionista: pazienti/dettaglio_professionista.md
  - Gestione Professionisti:
    - Task:
      - Team Leader: professionisti/task_team_leader.md
      - Professionista: professionisti/task_professionista.md
    - Formazione:
      - Team Leader: professionisti/formazione_team_leader.md
      - Professionista: professionisti/formazione_professionista.md
  - Gestione Azienda:
    - Check Azienda:
      - Team Leader: azienda/check_azienda_team_leader.md
      - Professionista: azienda/check_azienda_professionista.md
