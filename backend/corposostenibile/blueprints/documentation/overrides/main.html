{% extends "base.html" %}
{% block footer %}{% endblock %}

{% block extrahead %}
<script src="https://unpkg.com/mermaid@11/dist/mermaid.min.js"></script>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Converti tutti i pre.mermaid in div.mermaid (mermaid richiede div, non pre)
  document.querySelectorAll('pre.mermaid').forEach(function(pre) {
    var div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = pre.querySelector('code')?.textContent || pre.textContent;
    pre.replaceWith(div);
  });

  // Inizializza mermaid
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        primaryColor: '#d1fae5',
        primaryTextColor: '#065f46',
        primaryBorderColor: '#10b981',
        lineColor: '#6b7280',
      },
      securityLevel: 'loose',
    });
    mermaid.run({ querySelector: 'div.mermaid' });
  }
});
</script>
{% endblock %}
