{% extends "base.html" %}
{% block title %}Add Work Log{% endblock %}
{% block content %}
<div class="container">
    <div class="row mb-4"><div class="col-12"><h1><i class="fas fa-clock"></i> Log Your Hours</h1></div></div>
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3">
                    <label class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" name="date" class="form-control" value="{{ request.form.get('date', '') or (now().strftime('%Y-%m-%d') if now else '') }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Hours Worked <span class="text-danger">*</span></label>
                    <input type="number" step="0.5" min="0.5" max="24" name="hours_worked" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Work Type <span class="text-danger">*</span></label>
                    <select name="work_type" class="form-select" required>
                        {% for wt in work_types %}<option value="{{ wt.name }}">{{ wt.value|title }}</option>{% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Intervention (Optional)</label>
                    <select name="intervention_id" class="form-select">
                        <option value="">-- No Intervention --</option>
                        {% for intervention in my_interventions %}<option value="{{ intervention.id }}">{{ intervention.title }}</option>{% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save Work Log</button>
                <a href="{{ url_for('dev_tracker.developer_dashboard', user_id=current_user.id) }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
