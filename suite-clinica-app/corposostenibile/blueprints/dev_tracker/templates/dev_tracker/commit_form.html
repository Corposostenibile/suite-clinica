{% extends "base.html" %}
{% block title %}Add Commit{% endblock %}
{% block content %}
<div class="container">
    <div class="row mb-4"><div class="col-12"><h1><i class="fas fa-code-branch"></i> Add Commit Manually</h1></div></div>
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3"><label class="form-label">Intervention <span class="text-danger">*</span></label><select name="intervention_id" class="form-select" required>{% for intervention in my_interventions %}<option value="{{ intervention.id }}">{{ intervention.title }}</option>{% endfor %}</select></div>
                <div class="mb-3"><label class="form-label">Commit Hash</label><input type="text" name="commit_hash" class="form-control" placeholder="a1b2c3d"></div>
                <div class="mb-3"><label class="form-label">Commit Message <span class="text-danger">*</span></label><textarea name="commit_message" class="form-control" rows="2" required></textarea></div>
                <div class="mb-3"><label class="form-label">Branch</label><input type="text" name="branch" class="form-control" placeholder="main"></div>
                <div class="row"><div class="col-md-4"><label>Files Changed</label><input type="number" name="files_changed" class="form-control"></div><div class="col-md-4"><label>Additions</label><input type="number" name="additions" class="form-control"></div><div class="col-md-4"><label>Deletions</label><input type="number" name="deletions" class="form-control"></div></div>
                <div class="mb-3 mt-3"><label class="form-label">GitHub URL</label><input type="url" name="github_url" class="form-control" placeholder="https://github.com/..."></div>
                <button type="submit" class="btn btn-info"><i class="fas fa-save"></i> Save Commit</button>
                <a href="{{ url_for('dev_tracker.developer_dashboard', user_id=current_user.id) }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
