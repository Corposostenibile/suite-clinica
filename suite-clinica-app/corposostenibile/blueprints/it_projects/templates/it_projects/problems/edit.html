{% extends "base.html" %}

{% block title %}Modifica Problema - Corposostenibile{% endblock %}

{% block content %}
<div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-24">
  <div class="d-flex align-items-center gap-3">
    <a href="{{ url_for('it_projects.problems_detail', problem_id=problem.id) }}" class="btn btn-sm btn-outline-secondary">
      <i class="ri-arrow-left-line"></i>
    </a>
    <div>
      <h6 class="fw-semibold mb-0">Modifica Problema</h6>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a href="{{ url_for('it_projects.problems_list') }}">Problemi</a></li>
          <li class="breadcrumb-item"><a href="{{ url_for('it_projects.problems_detail', problem_id=problem.id) }}">{{ problem.title[:30] }}...</a></li>
          <li class="breadcrumb-item active">Modifica</li>
        </ol>
      </nav>
    </div>
  </div>
</div>

<form method="POST" action="{{ url_for('it_projects.problems_edit', problem_id=problem.id) }}">
  <div class="row gy-4">
    <div class="col-lg-8">
      <div class="card mb-4">
        <div class="card-header">
          <h6 class="card-title mb-0">
            <i class="ri-edit-line text-primary-600 me-2"></i>Dettagli Problema
          </h6>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-medium">Titolo <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" value="{{ problem.title }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium">Descrizione <span class="text-danger">*</span></label>
            <textarea name="description" class="form-control" rows="5" required>{{ problem.description }}</textarea>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-medium">Criticita</label>
              <select name="criticality" class="form-select">
                {% for value, label in criticality_choices %}
                <option value="{{ value }}" {% if problem.criticality == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">Strumento</label>
              <select name="tool" class="form-select">
                {% for value, label in tool_choices %}
                <option value="{{ value }}" {% if problem.tool == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-0">
            <label class="form-label fw-medium">Note Risoluzione</label>
            <textarea name="resolution_notes" class="form-control" rows="4" placeholder="Descrivi come e stato risolto il problema...">{{ problem.resolution_notes or '' }}</textarea>
            <small class="text-muted">Compilare quando il problema viene risolto</small>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card mb-4">
        <div class="card-header">
          <h6 class="card-title mb-0">
            <i class="ri-settings-line text-secondary me-2"></i>Stato e Assegnazione
          </h6>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-medium">Stato</label>
            <select name="status" class="form-select">
              {% for value, label in status_choices %}
              <option value="{{ value }}" {% if problem.status == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-0">
            <label class="form-label fw-medium">Assegnato a</label>
            <select name="assigned_to_id" class="form-select">
              <option value="">Non assegnato</option>
              {% for member in it_members %}
              <option value="{{ member.id }}" {% if problem.assigned_to_id == member.id %}selected{% endif %}>
                {{ member.full_name }}
              </option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <button type="submit" class="btn btn-primary-600 w-100 mb-2">
            <i class="ri-save-line me-1"></i>Salva Modifiche
          </button>
          <a href="{{ url_for('it_projects.problems_detail', problem_id=problem.id) }}" class="btn btn-outline-secondary w-100">
            <i class="ri-close-line me-1"></i>Annulla
          </a>
        </div>
      </div>
    </div>
  </div>
</form>
{% endblock %}
