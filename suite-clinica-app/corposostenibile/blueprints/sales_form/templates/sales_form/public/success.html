<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Inviato con Successo - Corposostenibile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #28a745;
            --secondary-color: #1e7e34;
            --dark-color: #212529;
        }
        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .success-container {
            max-width: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 60px 40px;
            text-align: center;
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            color: white;
        }
        .btn-primary:hover {
            background: var(--secondary-color);
        }
        h1 {
            color: var(--dark-color);
        }
        .logo-container {
            margin-bottom: 30px;
        }
        .logo-container img {
            max-width: 200px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <i class="ri-check-line ri-3x text-white"></i>
        </div>
        
        <div class="logo-container">
            <img src="{{ url_for('static', filename='assets/immagini/corposostenibile.jpg') }}" alt="Corposostenibile Logo">
        </div>

        <h1 class="mb-3">Grazie!</h1>

        <p class="lead mb-4">
            Il tuo form è stato inviato con successo. Analizzeremo tutto.
        </p>


        <div class="mt-4">
            {% if redirect_url %}
            <p class="text-muted mb-3">Sarai reindirizzato automaticamente tra <span id="countdown">5</span> secondi...</p>
            <a href="{{ redirect_url }}" class="btn btn-primary">
                Continua <i class="ri-arrow-right-line ms-2"></i>
            </a>
            {% endif %}
        </div>

        <div class="mt-5 text-muted">
            <small style="color: #212529;">© 2025 Corposostenibile. Tutti i diritti riservati.</small>
        </div>
    </div>

    {% if redirect_url %}
    <script>
        let seconds = 5;
        const countdown = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdown.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = '{{ redirect_url }}';
            }
        }, 1000);
    </script>
    {% endif %}
</body>
</html>
