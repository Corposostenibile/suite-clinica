{% extends "base.html" %}

{% block title %}500 - Errore Server – Corposostenibile{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card text-center py-5">
                <div class="card-body">
                    <i class="ri-alert-line ri-4x text-danger mb-3"></i>
                    <h1 class="mb-3">500</h1>
                    <h4>Errore del Server</h4>
                    <p class="text-muted mb-4">{{ message|default('Si è verificato un errore interno. Riprova più tardi.') }}</p>
                    <a href="{{ url_for('sales_form.dashboard') }}" class="btn btn-primary">
                        <i class="ri-refresh-line me-2"></i>Riprova
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
