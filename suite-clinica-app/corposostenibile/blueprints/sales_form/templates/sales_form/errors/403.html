{% extends "base.html" %}

{% block title %}403 - Accesso Negato – Corposostenibile{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card text-center py-5">
                <div class="card-body">
                    <i class="ri-lock-line ri-4x text-danger mb-3"></i>
                    <h1 class="mb-3">403</h1>
                    <h4>Accesso Negato</h4>
                    <p class="text-muted mb-4">{{ message|default('Non hai i permessi per accedere a questa risorsa') }}</p>
                    <a href="{{ url_for('sales_form.dashboard') }}" class="btn btn-primary">
                        <i class="ri-arrow-left-line me-2"></i>Torna Indietro
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
