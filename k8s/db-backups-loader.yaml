apiVersion: v1
kind: Pod
metadata:
  name: db-backups-loader
  labels:
    app: suite-clinica
spec:
  restartPolicy: Never
  containers:
  - name: loader
    image: alpine:3.19
    command: ["/bin/sh", "-c"]
    args:
    - |
      mkdir -p /data/backups/new_suite_backups /data/backups/old_suite_backups
      echo "Loader pod ready. Use kubectl cp to upload backups, then delete this pod."
      sleep 36000
    volumeMounts:
    - name: db-backups
      mountPath: /data/backups
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
  volumes:
  - name: db-backups
    persistentVolumeClaim:
      claimName: db-backups-pvc
