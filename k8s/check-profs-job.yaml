apiVersion: batch/v1
kind: Job
metadata:
  name: check-profs-job
spec:
  template:
    spec:
      containers:
      - name: checker
        image: europe-west8-docker.pkg.dev/suite-clinica/suite-clinica-repo/backend:latest
        command: ["python", "/app/scripts/check_profs.py"]
        volumeMounts:
        - name: script-vol
          mountPath: /app/scripts/check_profs.py
          subPath: check_profs.py
        env:
        - name: DATABASE_URL
          value: "postgresql://suite_clinica:i1%5Bi%2FY%25y%5DD%25Ihg%2Bh@127.0.0.1:5432/suite_clinica_prod"
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.2
        args:
          - "--port=5432"
          - "--credentials-file=/secrets/cloudsql/credentials.json"
          - "suite-clinica:europe-west8:suite-clinica-db-prod"
        volumeMounts:
        - name: sql-proxy-key
          mountPath: /secrets/cloudsql
          readOnly: true
      volumes:
      - name: sql-proxy-key
        secret:
          secretName: sql-proxy-key
      - name: script-vol
        configMap:
          name: check-profs-script
      restartPolicy: Never