apiVersion: apps/v1
kind: Deployment
metadata:
  name: suite-clinica-backend
  labels:
    app: suite-clinica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: suite-clinica
  template:
    metadata:
      labels:
        app: suite-clinica
    spec:
      containers:
      - name: backend
        image: europe-west8-docker.pkg.dev/$PROJECT_ID/suite-clinica-repo/backend:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        env:
        - name: FLASK_ENV
          value: "production"
        # Database connection env vars should be injected via Secrets later
        # - name: DATABASE_URL
        #   valueFrom:
        #     secretKeyRef:
        #       name: db-credentials
        #       key: database_url
