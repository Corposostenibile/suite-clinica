apiVersion: v1
kind: Secret
metadata:
  name: app-integrations
  labels:
    app: suite-clinica
type: Opaque
stringData:
  # PWA push
  vapid_public_key: "CHANGE_ME"
  vapid_private_key: "CHANGE_ME"
  vapid_claims_sub: "mailto:it@corposostenibile.com"

  # Respond.io
  respond_io_api_token: "CHANGE_ME"
  # opzionale, lasciare vuoto se non usato
  respond_io_default_channel_id: ""

  # GHL webhook stato globale (obbligatorio solo in mode=live)
  ghl_global_status_webhook_url: ""
