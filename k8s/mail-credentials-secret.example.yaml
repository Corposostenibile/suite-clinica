# Template del Secret `mail-credentials` utilizzato da backend e celery per
# l'invio email (Flask-Mail). Il Secret reale NON e' committato in git: va
# creato manualmente nel cluster prod con:
#
#   kubectl create secret generic mail-credentials \
#     --from-literal=MAIL_SERVER=smtp.gmail.com \
#     --from-literal=MAIL_PORT=587 \
#     --from-literal=MAIL_USE_TLS=1 \
#     --from-literal=MAIL_USERNAME=<mittente@gmail.com> \
#     --from-literal=MAIL_PASSWORD=<gmail_app_password_16_char> \
#     --from-literal=MAIL_DEFAULT_SENDER=<mittente@gmail.com> \
#     --from-literal=FRONTEND_BASE_URL=https://clinica.corposostenibile.com
#
# Per Gmail: serve 2-Step Verification attiva + App Password generata da
# https://myaccount.google.com/apppasswords (16 caratteri).
#
# Per ruotare la password:
#   kubectl delete secret mail-credentials
#   kubectl create secret generic mail-credentials --from-literal=... (nuovi valori)
#   kubectl rollout restart deployment/suite-clinica-backend deployment/suite-clinica-celery
#
apiVersion: v1
kind: Secret
metadata:
  name: mail-credentials
  labels:
    app: suite-clinica
type: Opaque
stringData:
  MAIL_SERVER: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_USE_TLS: "1"
  MAIL_USERNAME: "CHANGE_ME@gmail.com"
  MAIL_PASSWORD: "CHANGE_ME_APP_PASSWORD"
  MAIL_DEFAULT_SENDER: "CHANGE_ME@gmail.com"
  FRONTEND_BASE_URL: "https://clinica.corposostenibile.com"
