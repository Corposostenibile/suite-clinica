apiVersion: batch/v1
kind: Job
metadata:
  name: check-db-values
spec:
  template:
    spec:
      containers:
      - name: checker
        image: postgres:16-alpine
        command: ["/bin/sh", "-c"]
        args:
        - |
          until pg_isready -h 127.0.0.1 -p 5432; do sleep 2; done
          echo "=== Specialty distribution (Active only) ==="
          psql -h 127.0.0.1 -U $PGUSER -d $PGDATABASE -c "SELECT specialty, count(*) FROM users WHERE is_active=true GROUP BY specialty;"
          echo "=== Sample active professionals ==="
          psql -h 127.0.0.1 -U $PGUSER -d $PGDATABASE -c "SELECT id, first_name, last_name, specialty, role FROM users WHERE is_active=true AND specialty IS NOT NULL LIMIT 20;"
        env:
        - name: PGUSER
          valueFrom: { secretKeyRef: { name: db-credentials, key: username } }
        - name: PGPASSWORD
          valueFrom: { secretKeyRef: { name: db-credentials, key: password } }
        - name: PGDATABASE
          valueFrom: { secretKeyRef: { name: db-credentials, key: database } }
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.2
        args:
          - "--port=5432"
          - "--credentials-file=/secrets/cloudsql/credentials.json"
          - "suite-clinica:europe-west8:suite-clinica-db-prod"
        volumeMounts:
        - name: sql-proxy-key
          mountPath: /secrets/cloudsql
          readOnly: true
      volumes:
      - name: sql-proxy-key
        secret:
          secretName: sql-proxy-key
      restartPolicy: Never
