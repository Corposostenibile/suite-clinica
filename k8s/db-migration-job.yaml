apiVersion: batch/v1
kind: Job
metadata:
  name: suite-clinica-db-migration
  labels:
    app: suite-clinica
spec:
  # Elimina automaticamente il Job 10 minuti (600s) dopo il completamento
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      
      # K8s 1.29+ Native Sidecar: Il proxy viene definito qui ma gira come sidecar
      initContainers:
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.2
        restartPolicy: Always  # <--- Questo lo rende un Sidecar che muore col main container
        args:
          - "--port=5432"
          - "--credentials-file=/secrets/cloudsql/credentials.json"
          - "suite-clinica:europe-west8:suite-clinica-db-prod"
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: sql-proxy-key
          mountPath: /secrets/cloudsql
          readOnly: true

      containers:
      - name: migrator
        image: europe-west8-docker.pkg.dev/suite-clinica/suite-clinica-repo/backend:migration-debug-6
        imagePullPolicy: Always
        env:
        - name: NEW_SUITE_BACKUP
          value: /data/backups/new_suite_backups/schema_latest.sql
        - name: OLD_SUITE_BACKUP
          value: /data/backups/old_suite_backups/db_backup_20260205_121004.dump
        - name: OUTPUT_FILE
          value: /data/output/migrated_db.sql
        - name: PGHOST
          value: "127.0.0.1"
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -euo pipefail
          echo "[migration] preflight checks..."
          if [ ! -f "$NEW_SUITE_BACKUP" ]; then
            echo "[migration][error] NEW_SUITE_BACKUP not found: $NEW_SUITE_BACKUP"
            ls -lah /data/backups/new_suite_backups || true
            exit 1
          fi
          if [ ! -f "$OLD_SUITE_BACKUP" ]; then
            echo "[migration][error] OLD_SUITE_BACKUP not found: $OLD_SUITE_BACKUP"
            ls -lah /data/backups/old_suite_backups || true
            exit 1
          fi
          echo "[migration] waiting for Cloud SQL Proxy..."
          until pg_isready -h "${PGHOST}" -p "${PGPORT}"; do
            sleep 2
          done
          echo "[migration] generating migrated dump..."
          python scripts/migration_scripts/schema_comparator.py
          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "[migration][error] generated dump is empty: $OUTPUT_FILE"
            exit 1
          fi
          echo "[migration] applying migrated dump to target DB (ignoring errors to proceed)..."
          psql -v ON_ERROR_STOP=0 -f "$OUTPUT_FILE" || true
          echo "[migration] done"
        volumeMounts:
        - name: db-backups
          mountPath: /data/backups
        - name: output
          mountPath: /data/output
        - name: migration-script
          mountPath: /app/scripts/migration_scripts/schema_comparator.py
          subPath: schema_comparator.py
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
            
      volumes:
      - name: db-backups
        persistentVolumeClaim:
          claimName: db-backups-pvc
      - name: output
        emptyDir: {}
      - name: sql-proxy-key
        secret:
          secretName: sql-proxy-key
      - name: migration-script
        configMap:
          name: migration-script-config
