apiVersion: batch/v1
kind: Job
metadata:
  name: suite-clinica-db-backup-schema
  labels:
    app: suite-clinica
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      
      initContainers:
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.2
        restartPolicy: Always
        args:
          - "--port=5432"
          - "--credentials-file=/secrets/cloudsql/credentials.json"
          - "suite-clinica:europe-west8:suite-clinica-db-prod"
        securityContext:
          runAsNonRoot: true
        volumeMounts:
        - name: sql-proxy-key
          mountPath: /secrets/cloudsql
          readOnly: true
          
      containers:
      - name: backup-tool
        image: postgres:16-alpine
        env:
        - name: PGHOST
          value: "127.0.0.1"
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          echo "Attesa che il Cloud SQL Proxy sia pronto..."
          until pg_isready -h 127.0.0.1 -p 5432; do
            sleep 2
          done
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_PATH="/data/backups/new_suite_backups/schema_backup_${TIMESTAMP}.sql"
          
          mkdir -p /data/backups/new_suite_backups
          
          echo "Esecuzione del dump dello schema..."
          pg_dump -s -v -h 127.0.0.1 > "$BACKUP_PATH"
          
          echo "Backup completato con successo in: $BACKUP_PATH"
          # Creiamo anche un link simbolico come 'latest' per facilità d'uso
          ln -sf "schema_backup_${TIMESTAMP}.sql" /data/backups/new_suite_backups/schema_latest.sql
          echo "Schema backup salvato."
        volumeMounts:
        - name: db-backups
          mountPath: /data/backups
          
      volumes:
      - name: db-backups
        persistentVolumeClaim:
          claimName: db-backups-pvc
      - name: sql-proxy-key
        secret:
          secretName: sql-proxy-key
