steps:
  # 1. Build Layer: Crea l'immagine Docker
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    env:
      - 'CB_PROJECT_ID=$PROJECT_ID'
      - 'CB_COMMIT_SHA=$COMMIT_SHA'
      - 'CB_BUILD_ID=$BUILD_ID'
    args:
      - -lc
      - |
        set -euo pipefail
        IMAGE_TAG="$${CB_COMMIT_SHA}"
        if [ -z "$${IMAGE_TAG}" ]; then
          echo "ERROR: COMMIT_SHA substitution mancante. Esegui gcloud builds submit con --substitutions=COMMIT_SHA=<git-sha>" >&2
          exit 2
        fi
        IMAGE="europe-west8-docker.pkg.dev/$${CB_PROJECT_ID}/suite-clinica-repo/backend:$${IMAGE_TAG}"
        for attempt in 1 2 3; do
          echo "Docker build attempt $${attempt}/3 for $${IMAGE}"
          if docker build -t "$${IMAGE}" .; then
            exit 0
          fi
          rc=$?
          echo "docker build failed (rc=$${rc})"
          if [ "$${attempt}" -eq 3 ]; then
            exit "$${rc}"
          fi
          echo "Retrying docker build in 10s (transient builder failure mitigation)..."
          sleep 10
        done

  # 2. Push Layer: Carica su Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    env:
      - 'CB_PROJECT_ID=$PROJECT_ID'
      - 'CB_COMMIT_SHA=$COMMIT_SHA'
      - 'CB_BUILD_ID=$BUILD_ID'
    args:
      - -lc
      - |
        set -euo pipefail
        IMAGE_TAG="$${CB_COMMIT_SHA}"
        if [ -z "$${IMAGE_TAG}" ]; then
          echo "ERROR: COMMIT_SHA substitution mancante. Esegui gcloud builds submit con --substitutions=COMMIT_SHA=<git-sha>" >&2
          exit 2
        fi
        IMAGE="europe-west8-docker.pkg.dev/$${CB_PROJECT_ID}/suite-clinica-repo/backend:$${IMAGE_TAG}"
        for attempt in 1 2 3; do
          echo "Docker push attempt $${attempt}/3 for $${IMAGE}"
          if docker push "$${IMAGE}"; then
            exit 0
          fi
          rc=$?
          echo "docker push failed (rc=$${rc})"
          if [ "$${attempt}" -eq 3 ]; then
            exit "$${rc}"
          fi
          echo "Retrying docker push in 10s..."
          sleep 10
        done

  # 2a. Ghost Patients Fix Test: Verifica che i 3 pazienti problematici
  #     (MICHELA VIGOLO 29415, GRETA BELLUCCI 29434, PATRIZIA LANZI 29414)
  #     non siano più in stato ghost nonostante servizi attivi.
  #     SE IL TEST FALLISCE → DEPLOY BLOCCATO (exit 1)
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - exec
      - deployment/suite-clinica-backend
      - -c
      - backend
      - --
      - bash
      - -lc
      - |
        set -euo pipefail
        echo "============================================================"
        echo "STEP 2a: Ghost Patients Fix Test"
        echo "============================================================"
        echo "Verifica che i 3 pazienti problematici siano in stato coerente..."
        echo ""
        
        if [ -f /app/scripts/production_tests/test_ghost_patients_fix.py ]; then
          PYTHONPATH=/app python /app/scripts/production_tests/test_ghost_patients_fix.py
          TEST_RC=$?
          
          if [ "$${TEST_RC}" -ne 0 ]; then
            echo ""
            echo "============================================================"
            echo "FATAL: Ghost Patients Fix Test FALLITO!"
            echo "       I pazienti MICHELA VIGOLO, GRETA BELLUCCI, PATRIZIA LANZI"
            echo "       risultano ancora in stato ghost nonostante servizi attivi."
            echo "       IL DEPLOY E' BLOCCATO."
            echo "============================================================"
            exit 1
          fi
          
          echo ""
          echo "============================================================"
          echo "PASS: Ghost Patients Fix Test OK!"
          echo "     Tutti i 3 pazienti sono in stato coerente."
          echo "============================================================"
        else
          echo "[WARN] Script test_ghost_patients_fix.py non presente, skip test."
          echo "       Questo è OK per branch senza il fix."
        fi
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'

  # 3. Deploy Layer: Aggiorna GKE
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=k8s/deployment.yaml
      - --filename=k8s/celery-deployment.yaml
      - --filename=k8s/uploads-backup-cronjob.yaml
      - --filename=k8s/uploads-snapshot-cronjob.yaml
      - --filename=k8s/service.yaml
      - --filename=k8s/frontendconfig.yaml
      - --filename=k8s/managed-certificate.yaml
      - --filename=k8s/ingress.yaml
      - --filename=k8s/hpa.yaml
      - --location=europe-west8
      - --cluster=suite-clinica-cluster-prod
      - --image=europe-west8-docker.pkg.dev/$PROJECT_ID/suite-clinica-repo/backend:$COMMIT_SHA

  # 3b. Enforce backend image rollout explicitly (gke-deploy can report success
  # without updating the live Deployment image in some cases).
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - set
      - image
      - deployment/suite-clinica-backend
      - backend=europe-west8-docker.pkg.dev/$PROJECT_ID/suite-clinica-repo/backend:$COMMIT_SHA
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'

  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - rollout
      - status
      - deployment/suite-clinica-backend
      - --timeout=900s
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'

  # 3c. Enforce celery image rollout
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - set
      - image
      - deployment/suite-clinica-celery
      - celery-worker=europe-west8-docker.pkg.dev/$PROJECT_ID/suite-clinica-repo/backend:$COMMIT_SHA
      - celery-beat=europe-west8-docker.pkg.dev/$PROJECT_ID/suite-clinica-repo/backend:$COMMIT_SHA
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'

  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - rollout
      - status
      - deployment/suite-clinica-celery
      - --timeout=900s
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'

  # 4. Migration Layer: Applica automaticamente le migrazioni Alembic
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - exec
      - deployment/suite-clinica-backend
      - -c
      - backend
      - --
      - bash
      - -lc
      - |
        set -euo pipefail
        flask db upgrade
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'

  # 4b. Schema parity check separato: evita falsi negativi e isola meglio exit code/risorse
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - exec
      - deployment/suite-clinica-backend
      - -c
      - backend
      - --
      - bash
      - -lc
      - |
        set -euo pipefail
        PYTHONPATH=/app python /app/scripts/migration_scripts/verify_schema_parity.py
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'

  # 5. Initial Checks Seed Layer: crea/aggiorna i check iniziali usati dal bridge GHL
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - exec
      - deployment/suite-clinica-backend
      - -c
      - backend
      - --
      - bash
      - -lc
      - |
        set +e
        if [ -f /app/corposostenibile/blueprints/client_checks/scripts/seed_initial_checks.py ]; then
          python /app/corposostenibile/blueprints/client_checks/scripts/seed_initial_checks.py
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "seed_initial_checks.py failed (rc=$rc), continuing to post-deploy sync steps"
          fi
        else
          echo "seed_initial_checks.py non presente nell'immagine, skip"
        fi
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'

  # 6. Sync Criteria Layer: Esegue lo script di sincronizzazione criteri caricando i dati dal file Excel
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - exec
      - deployment/suite-clinica-backend
      - -c
      - backend
      - --
      - bash
      - -lc
      - |
        set -euo pipefail
        if [ -f /app/scripts/migration_scripts/sync_criteria_prod.py ] && [ -f "/app/corposostenibile/blueprints/sales_form/assegnazioni_xlsx/Criteri Ai.xlsx" ]; then
          PYTHONPATH=/app python /app/scripts/migration_scripts/sync_criteria_prod.py
        else
          echo "sync_criteria_prod prerequisites mancanti, skip"
        fi
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'

# Configurazione Timeout e Log
timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY
