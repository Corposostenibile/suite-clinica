steps:
  # 1. Build Layer: Crea l'immagine Docker
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend-image'
    entrypoint: 'bash'
    env:
      - 'CB_PROJECT_ID=$PROJECT_ID'
      - 'CB_COMMIT_SHA=$COMMIT_SHA'
      - 'CB_BUILD_ID=$BUILD_ID'
    args:
      - -lc
      - |
        set -euo pipefail
        IMAGE_TAG="$${CB_COMMIT_SHA}"
        if [ -z "$${IMAGE_TAG}" ]; then
          echo "ERROR: COMMIT_SHA substitution mancante. Esegui gcloud builds submit con --substitutions=COMMIT_SHA=<git-sha>" >&2
          exit 2
        fi
        IMAGE="europe-west8-docker.pkg.dev/$${CB_PROJECT_ID}/suite-clinica-repo/backend:$${IMAGE_TAG}"
        for attempt in 1 2 3; do
          echo "Docker build attempt $${attempt}/3 for $${IMAGE}"
          if docker build -t "$${IMAGE}" .; then
            exit 0
          fi
          rc=$?
          echo "docker build failed (rc=$${rc})"
          if [ "$${attempt}" -eq 3 ]; then
            exit "$${rc}"
          fi
          echo "Retrying docker build in 10s (transient builder failure mitigation)..."
          sleep 10
        done

  # 1.1. Backend Test Suite: Execute pytest (dockerized Postgres + python)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-backend-tests'
    waitFor: ['build-backend-image']
    entrypoint: 'bash'
    args:
      - -lc
      - |
        set -euo pipefail
        WORKDIR="$$PWD"
        NET="test-net"
        DB_CONTAINER="test-postgres"
        docker network create "$$NET"
        docker run -d --name "$$DB_CONTAINER" --network "$$NET" \
          -e POSTGRES_DB=suite_clinica_test \
          -e POSTGRES_USER=test \
          -e POSTGRES_PASSWORD=test \
          postgres:15-alpine
        for i in {1..30}; do
          if docker exec "$$DB_CONTAINER" pg_isready -U test -d suite_clinica_test; then
            echo "Postgres is ready"
            break
          fi
          echo "Waiting for Postgres... ($i/30)"
          sleep 2
        done
        docker run --rm --network "$$NET" -v "$$WORKDIR/backend":/workspace/backend -w /workspace/backend python:3.11 bash -lc "\
          set -euo pipefail && \
          apt-get update && apt-get install -y libpq-dev gcc && \
          pip install poetry==1.7.1 && \
          poetry install --no-interaction --no-ansi && \
          DATABASE_URL=postgresql://test:test@$$DB_CONTAINER:5432/suite_clinica_test \\
          FLASK_ENV=testing \\
          PYTHONUNBUFFERED=1 \\
          poetry run pytest tests/api/ -v --tb=short"
        docker stop "$$DB_CONTAINER"
        docker rm "$$DB_CONTAINER"
        docker network rm "$$NET"

  # 2. Push Layer: Carica su Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend-image'
    waitFor: ['build-backend-image', 'run-backend-tests']
    entrypoint: 'bash'
    env:
      - 'CB_PROJECT_ID=$PROJECT_ID'
      - 'CB_COMMIT_SHA=$COMMIT_SHA'
      - 'CB_BUILD_ID=$BUILD_ID'
    args:
      - -lc
      - |
        set -euo pipefail
        IMAGE_TAG="$${CB_COMMIT_SHA}"
        if [ -z "$${IMAGE_TAG}" ]; then
          echo "ERROR: COMMIT_SHA substitution mancante. Esegui gcloud builds submit con --substitutions=COMMIT_SHA=<git-sha>" >&2
          exit 2
        fi
        IMAGE="europe-west8-docker.pkg.dev/$${CB_PROJECT_ID}/suite-clinica-repo/backend:$${IMAGE_TAG}"
        for attempt in 1 2 3; do
          echo "Docker push attempt $${attempt}/3 for $${IMAGE}"
          if docker push "$${IMAGE}"; then
            exit 0
          fi
          rc=$?
          echo "docker push failed (rc=$${rc})"
          if [ "$${attempt}" -eq 3 ]; then
            exit "$${rc}"
          fi
          echo "Retrying docker push in 10s..."
          sleep 10
        done

  # 3. Deploy Layer: Aggiorna GKE
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy-backend'
    waitFor: ['push-backend-image']
    entrypoint: 'bash'
    env:
      - '_SKIP_DEPLOY=${_SKIP_DEPLOY}'
    args:
      - -lc
      - |
        set -euo pipefail
        if [ "${_SKIP_DEPLOY:-false}" = "true" ]; then
          echo "[deploy-backend] SKIP_DEPLOY=true, skipping deploy step"
          exit 0
        fi
        gke-deploy run \
          --filename=k8s/deployment.yaml \
          --filename=k8s/celery-deployment.yaml \
          --filename=k8s/uploads-backup-cronjob.yaml \
          --filename=k8s/uploads-snapshot-cronjob.yaml \
          --filename=k8s/service.yaml \
          --filename=k8s/frontendconfig.yaml \
          --filename=k8s/managed-certificate.yaml \
          --filename=k8s/ingress.yaml \
          --filename=k8s/hpa.yaml \
          --location=europe-west8 \
          --cluster=suite-clinica-cluster-prod \
          --image=europe-west8-docker.pkg.dev/$PROJECT_ID/suite-clinica-repo/backend:$COMMIT_SHA

  # 3b. Enforce backend image rollout explicitly (gke-deploy can report success
  # without updating the live Deployment image in some cases).
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'kubectl-set-backend-image'
    waitFor: ['deploy-backend']
    entrypoint: 'bash'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'
      - '_SKIP_DEPLOY=${_SKIP_DEPLOY}'
    args:
      - -lc
      - |
        set -euo pipefail
        if [ "${_SKIP_DEPLOY:-false}" = "true" ]; then
          echo "[kubectl-set-backend-image] SKIP_DEPLOY=true, skipping"
          exit 0
        fi
        kubectl set image deployment/suite-clinica-backend backend=europe-west8-docker.pkg.dev/$PROJECT_ID/suite-clinica-repo/backend:$COMMIT_SHA

  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'kubectl-rollout-backend'
    waitFor: ['kubectl-set-backend-image']
    entrypoint: 'bash'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'
      - '_SKIP_DEPLOY=${_SKIP_DEPLOY}'
    args:
      - -lc
      - |
        set -euo pipefail
        if [ "${_SKIP_DEPLOY:-false}" = "true" ]; then
          echo "[kubectl-rollout-backend] SKIP_DEPLOY=true, skipping"
          exit 0
        fi
        kubectl rollout status deployment/suite-clinica-backend --timeout=900s

  # 3c. Enforce celery image rollout
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'kubectl-set-celery-image'
    waitFor: ['deploy-backend']
    entrypoint: 'bash'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'
      - '_SKIP_DEPLOY=${_SKIP_DEPLOY}'
    args:
      - -lc
      - |
        set -euo pipefail
        if [ "${_SKIP_DEPLOY:-false}" = "true" ]; then
          echo "[kubectl-set-celery-image] SKIP_DEPLOY=true, skipping"
          exit 0
        fi
        kubectl set image deployment/suite-clinica-celery \
          celery-worker=europe-west8-docker.pkg.dev/$PROJECT_ID/suite-clinica-repo/backend:$COMMIT_SHA \
          celery-beat=europe-west8-docker.pkg.dev/$PROJECT_ID/suite-clinica-repo/backend:$COMMIT_SHA

  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'kubectl-rollout-celery'
    waitFor: ['kubectl-set-celery-image']
    entrypoint: 'bash'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'
      - '_SKIP_DEPLOY=${_SKIP_DEPLOY}'
    args:
      - -lc
      - |
        set -euo pipefail
        if [ "${_SKIP_DEPLOY:-false}" = "true" ]; then
          echo "[kubectl-rollout-celery] SKIP_DEPLOY=true, skipping"
          exit 0
        fi
        kubectl rollout status deployment/suite-clinica-celery --timeout=900s

  # 4. Migration Layer: Applica automaticamente le migrazioni Alembic
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'run-migrations'
    waitFor: ['kubectl-rollout-backend']
    entrypoint: 'bash'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'
      - '_SKIP_DEPLOY=${_SKIP_DEPLOY}'
    args:
      - -lc
      - |
        set -euo pipefail
        if [ "${_SKIP_DEPLOY:-false}" = "true" ]; then
          echo "[run-migrations] SKIP_DEPLOY=true, skipping"
          exit 0
        fi
        kubectl exec deployment/suite-clinica-backend -c backend -- bash -lc 'set -euo pipefail; flask db upgrade'

  # 4b. Schema parity check separato: evita falsi negativi e isola meglio exit code/risorse
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'verify-schema-parity'
    waitFor: ['run-migrations']
    entrypoint: 'bash'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'
      - '_SKIP_DEPLOY=${_SKIP_DEPLOY}'
    args:
      - -lc
      - |
        set -euo pipefail
        if [ "${_SKIP_DEPLOY:-false}" = "true" ]; then
          echo "[verify-schema-parity] SKIP_DEPLOY=true, skipping"
          exit 0
        fi
        kubectl exec deployment/suite-clinica-backend -c backend -- bash -lc 'set -euo pipefail; PYTHONPATH=/app python /app/scripts/migration_scripts/verify_schema_parity.py'

  # 5. Initial Checks Seed Layer: crea/aggiorna i check iniziali usati dal bridge GHL
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'seed-initial-checks'
    waitFor: ['verify-schema-parity']
    entrypoint: 'bash'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'
      - '_SKIP_DEPLOY=${_SKIP_DEPLOY}'
    args:
      - -lc
      - |
        set +e
        if [ "${_SKIP_DEPLOY:-false}" = "true" ]; then
          echo "[seed-initial-checks] SKIP_DEPLOY=true, skipping"
          exit 0
        fi
        if [ -f /app/corposostenibile/blueprints/client_checks/scripts/seed_initial_checks.py ]; then
          python /app/corposostenibile/blueprints/client_checks/scripts/seed_initial_checks.py
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "seed_initial_checks.py failed (rc=$rc), continuing to post-deploy sync steps"
          fi
        else
          echo "seed_initial_checks.py non presente nell'immagine, skip"
        fi

  # 6. Sync Criteria Layer: Esegue lo script di sincronizzazione criteri caricando i dati dal file Excel
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'sync-criteria'
    waitFor: ['seed-initial-checks']
    entrypoint: 'bash'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west8'
      - 'CLOUDSDK_CONTAINER_CLUSTER=suite-clinica-cluster-prod'
      - '_SKIP_DEPLOY=${_SKIP_DEPLOY}'
    args:
      - -lc
      - |
        set -euo pipefail
        if [ "${_SKIP_DEPLOY:-false}" = "true" ]; then
          echo "[sync-criteria] SKIP_DEPLOY=true, skipping"
          exit 0
        fi
        if [ -f /app/scripts/migration_scripts/sync_criteria_prod.py ] && [ -f "/app/corposostenibile/blueprints/sales_form/assegnazioni_xlsx/Criteri Ai.xlsx" ]; then
          PYTHONPATH=/app python /app/scripts/migration_scripts/sync_criteria_prod.py
        else
          echo "sync_criteria_prod prerequisites mancanti, skip"
        fi

# Configurazione Timeout e Log
timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
